<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Spent</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2ede5;--surface:#fdfbf7;--border:rgba(44,32,23,.09);--border2:rgba(44,32,23,.05);
  --txt:#2c2017;--txt2:#7c6a55;--txt3:rgba(44,32,23,.38);
  --clay:#2c2017;--accent:#b5896a;--accent2:#e8d5bf;--accent3:#f0e4d0;
  --green:#4a7a52;--green-soft:rgba(74,122,82,.1);
  --red:#b85c4a;--red-soft:rgba(184,92,74,.08);
  --gold:#c49a3a;--gold-soft:rgba(196,154,58,.1);
  --gas:#5a7a9a;--gas-soft:rgba(90,122,154,.1);
  --r:14px;--r2:20px;
}
html,body{min-height:100%;background:var(--bg);font-family:Lexend,sans-serif;color:var(--txt)}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surface);border-top:1px solid var(--border)}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 9px;gap:3px;border:none;background:transparent;color:var(--txt3);font-family:Lexend,sans-serif;font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;position:relative;transition:color .2s;touch-action:manipulation}
.nav-btn::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--clay);border-radius:0 0 2px 2px;transform:scaleX(0);transition:transform .2s}
.nav-btn.active{color:var(--clay)}.nav-btn.active::after{transform:scaleX(1)}
.nav-ico{font-size:19px}
/* TODAY HEADER */
.today-header{background:var(--clay);padding:1.5rem 1.5rem 1.25rem;flex-shrink:0;position:relative;overflow:hidden}
.today-header::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
.today-eyebrow{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:5px;position:relative;z-index:1}
.today-date{font-family:Fraunces,serif;font-size:24px;font-weight:700;color:#fff;line-height:1;position:relative;z-index:1;margin-bottom:1rem}
.today-date em{font-style:italic;opacity:.6;font-size:18px}
/* BUDGET CARDS ROW */
.budget-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1}
.budget-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.85rem}
.budget-card-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.budget-card-lbl.gas{color:rgba(120,170,220,.9)}
.budget-card-lbl.misc{color:rgba(220,180,100,.9)}
.budget-card-nums{display:flex;align-items:baseline;gap:4px}
.budget-card-spent{font-family:Fraunces,serif;font-size:22px;font-weight:700;font-style:italic;color:#fff;line-height:1}
.budget-card-of{font-size:11px;color:rgba(255,255,255,.4);font-weight:300}
.budget-card-left{font-size:11px;margin-top:4px;font-weight:500}
.budget-card-left.ok{color:rgba(120,220,140,.9)}
.budget-card-left.warn{color:rgba(240,200,100,.9)}
.budget-card-left.over{color:rgba(240,140,120,.9)}
.budget-mini-bar{height:3px;background:rgba(255,255,255,.12);border-radius:2px;margin-top:7px;overflow:hidden}
.budget-mini-fill{height:3px;border-radius:2px;transition:width .5s ease}
/* WEEK RESET */
.week-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.week-bar-lbl{font-size:11px;color:var(--txt2);font-weight:400}
.week-reset-btn{font-size:11px;color:var(--txt3);background:none;border:1px solid var(--border);border-radius:100px;padding:5px 12px;cursor:pointer;font-family:Lexend,sans-serif;touch-action:manipulation}
.week-reset-btn:active{background:var(--bg)}
/* SCROLLABLE */
.scrollable{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* ADD CARD */
.add-card{margin:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;box-shadow:0 2px 16px rgba(44,32,23,.06)}
.add-card-title{font-family:Fraunces,serif;font-size:17px;font-weight:700;font-style:italic;color:var(--clay);margin-bottom:.9rem}
/* TYPE TABS */
.type-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem}
.type-tab{padding:.85rem;border:2px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:all .15s;font-family:Lexend,sans-serif;font-size:13px;font-weight:600;color:var(--txt2);background:var(--bg);touch-action:manipulation;user-select:none}
.type-tab .tab-ico{font-size:22px;display:block;margin-bottom:4px}
.type-tab.active.gas{border-color:var(--gas);background:var(--gas-soft);color:var(--gas)}
.type-tab.active.misc{border-color:var(--gold);background:var(--gold-soft);color:var(--gold)}
/* AMOUNT */
.amount-row{display:flex;align-items:center;gap:8px;margin-bottom:.9rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:6px 14px}
.amount-prefix{font-family:Fraunces,serif;font-size:26px;font-weight:700;color:var(--txt3);font-style:italic;flex-shrink:0}
.amount-input{flex:1;font-family:Fraunces,serif;font-size:28px;font-weight:700;font-style:italic;color:var(--clay);border:none;background:transparent;outline:none;width:100%;min-width:0}
.amount-input::placeholder{color:var(--accent2)}
.note-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--txt);font-family:Lexend,sans-serif;font-size:14px;outline:none;margin-bottom:.9rem;transition:border-color .2s;resize:none}
.note-input:focus{border-color:var(--clay)}
.submit-btn{width:100%;background:var(--clay);color:#fff;border:none;border-radius:100px;padding:13px;font-family:Lexend,sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(44,32,23,.2);transition:all .2s;touch-action:manipulation}
.submit-btn:active{transform:scale(.98)}
/* LOG LIST */
.today-log{padding:0 1rem 1rem}
.log-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin:1rem 0 .5rem;display:none}
.exp-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.8rem .9rem;display:flex;align-items:center;gap:10px;margin-bottom:6px;animation:slideIn .2s ease both}
.exp-ico{font-size:20px;flex-shrink:0;width:30px;text-align:center}
.exp-body{flex:1;min-width:0}
.exp-note{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.exp-amount{font-family:Fraunces,serif;font-size:17px;font-weight:700;font-style:italic;flex-shrink:0}
.del-btn{background:none;border:none;color:var(--txt3);font-size:17px;cursor:pointer;padding:0 3px;line-height:1;flex-shrink:0;touch-action:manipulation}
.del-btn:active{color:var(--red)}
.empty-today{text-align:center;padding:2rem 1rem;color:var(--txt3);font-family:Fraunces,serif;font-size:14px;font-style:italic;line-height:1.7}
/* HISTORY */
.screen-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.5rem 1.5rem 1rem;flex-shrink:0}
.screen-title{font-family:Fraunces,serif;font-size:24px;font-weight:700;font-style:italic;color:var(--clay)}
.history-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem}
.day-group{margin-bottom:1.25rem;animation:fadeUp .3s ease both}
.day-group-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding:0 .25rem}
.day-group-date{font-size:12px;font-weight:600;color:var(--txt2)}
.day-totals{display:flex;gap:8px}
.day-total-pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:100px}
.day-total-pill.gas{background:var(--gas-soft);color:var(--gas)}
.day-total-pill.misc{background:var(--gold-soft);color:var(--gold)}
.day-total-pill.over{background:var(--red-soft);color:var(--red)}
.no-data{text-align:center;padding:3rem 1rem;color:var(--txt3);font-family:Fraunces,serif;font-size:15px;font-style:italic;line-height:1.7}
/* STATS */
.stats-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:10px}
.stat-card-title{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:.75rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-cell{background:var(--bg);border-radius:10px;padding:.75rem}
.stat-cell-lbl{font-size:10px;color:var(--txt3);margin-bottom:4px}
.stat-cell-val{font-family:Fraunces,serif;font-size:22px;font-weight:700;font-style:italic;color:var(--clay)}
.stat-cell-val.green{color:var(--green)}.stat-cell-val.red{color:var(--red)}.stat-cell-val.gold{color:var(--gold)}
.two-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.two-bar-lbl{font-size:11px;color:var(--txt2);width:52px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.two-bar-track{flex:1;height:8px;background:var(--accent3);border-radius:4px;overflow:hidden}
.two-bar-fill{height:8px;border-radius:4px;transition:width .8s ease}
.two-bar-val{font-size:11px;font-weight:600;width:36px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

<!-- TODAY -->
<div class="screen active" id="screenToday">
  <div class="today-header">
    <div class="today-eyebrow" id="todayEyebrow">Monday</div>
    <div class="today-date" id="todayDate">May 12 <em>/ Weekly Budget</em></div>
    <div class="budget-cards">
      <div class="budget-card">
        <div class="budget-card-lbl gas">⛽ Gas</div>
        <div class="budget-card-nums">
          <div class="budget-card-spent" id="gasSpent">$0</div>
          <div class="budget-card-of">/ $70</div>
        </div>
        <div class="budget-card-left ok" id="gasLeft">$70 left</div>
        <div class="budget-mini-bar"><div class="budget-mini-fill" id="gasFill" style="width:0%;background:rgba(120,170,220,.8)"></div></div>
      </div>
      <div class="budget-card">
        <div class="budget-card-lbl misc">🛍 Misc</div>
        <div class="budget-card-nums">
          <div class="budget-card-spent" id="miscSpent">$0</div>
          <div class="budget-card-of">/ $70</div>
        </div>
        <div class="budget-card-left ok" id="miscLeft">$70 left</div>
        <div class="budget-mini-bar"><div class="budget-mini-fill" id="miscFill" style="width:0%;background:rgba(220,180,100,.8)"></div></div>
      </div>
    </div>
  </div>
  <div class="week-bar">
    <div class="week-bar-lbl" id="weekRangeLabel">Week of May 12</div>
    <button class="week-reset-btn" onclick="resetWeek()">New week ↺</button>
  </div>
  <div class="scrollable">
    <div class="add-card">
      <div class="add-card-title">What did you spend on?</div>
      <div class="type-tabs">
        <div class="type-tab active gas" id="tabGas" onclick="setType('gas')">
          <span class="tab-ico">⛽</span>Gas
        </div>
        <div class="type-tab misc" id="tabMisc" onclick="setType('misc')">
          <span class="tab-ico">🛍</span>Misc
        </div>
      </div>
      <div class="amount-row">
        <span class="amount-prefix">$</span>
        <input class="amount-input" id="amtIn" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
      </div>
      <textarea class="note-input" id="noteIn" placeholder="What was it for? (Shell, Walmart, Chipotle…)" rows="2" maxlength="80"></textarea>
      <button class="submit-btn" id="submitBtn" onclick="logExpense()">Log it →</button>
    </div>
    <div class="today-log">
      <div class="log-lbl" id="logLbl">This week's spending</div>
      <div id="todayList"></div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="screenHistory">
  <div class="screen-header"><div class="screen-title">History</div></div>
  <div class="history-body" id="historyBody"></div>
</div>

<!-- STATS -->
<div class="screen" id="screenStats">
  <div class="screen-header"><div class="screen-title">Stats</div></div>
  <div class="stats-body" id="statsBody"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="navToday" onclick="goTo('Today')"><span class="nav-ico">📅</span>This Week</button>
  <button class="nav-btn" id="navHistory" onclick="goTo('History')"><span class="nav-ico">📋</span>History</button>
  <button class="nav-btn" id="navStats" onclick="goTo('Stats')"><span class="nav-ico">📊</span>Stats</button>
</nav>
</div>

<script>
// Weekly budgets: $10/day x 7 = $70/week each
var GAS_WEEKLY = 70;
var MISC_WEEKLY = 70;
var INCOME = 320;

// Each expense: {id, ts, date, weekKey, type, amount, note}
var expenses = [];
var weekStart = null; // ISO date string of week start (Monday)
var selType = 'gas';

function save(){localStorage.setItem('spent_v3', JSON.stringify({expenses, weekStart}));}
function load(){
  try{
    var d = JSON.parse(localStorage.getItem('spent_v3'));
    if(d && d.expenses){expenses = d.expenses; weekStart = d.weekStart;}
  }catch(e){}
  if(!weekStart) weekStart = getWeekStart();
}

function pad(n){return n < 10 ? '0'+n : ''+n;}
function getWeekStart(date){
  var d = date ? new Date(date) : new Date();
  var day = d.getDay(); // 0=Sun
  var mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7));
  mon.setHours(0,0,0,0);
  return mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());
}
function getWeekKey(date){return getWeekStart(date);}
function currentWeekKey(){return weekStart || getWeekStart();}
function thisWeekExps(){return expenses.filter(e => e.weekKey === currentWeekKey());}
function fmt(n){return '$'+parseFloat(n).toFixed(2);}
function fmtShort(n){return '$'+parseFloat(n).toFixed(0);}

function weekRangeLabel(startStr){
  var start = new Date(startStr+'T12:00:00');
  var end = new Date(start); end.setDate(start.getDate()+6);
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return 'Week of '+M[start.getMonth()]+' '+start.getDate()+' – '+M[end.getMonth()]+' '+end.getDate();
}

function setType(t){
  selType = t;
  document.getElementById('tabGas').className = 'type-tab'+(t==='gas'?' active gas':'');
  document.getElementById('tabMisc').className = 'type-tab'+(t==='misc'?' active misc':'');
}

function renderToday(){
  var now = new Date();
  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('todayEyebrow').textContent = DAYS[now.getDay()];
  document.getElementById('todayDate').innerHTML = M[now.getMonth()]+' '+now.getDate()+' <em>/ Weekly Budget</em>';
  document.getElementById('weekRangeLabel').textContent = weekRangeLabel(currentWeekKey());

  var wExps = thisWeekExps();
  var gasSpent = wExps.filter(e=>e.type==='gas').reduce((s,e)=>s+e.amount,0);
  var miscSpent = wExps.filter(e=>e.type==='misc').reduce((s,e)=>s+e.amount,0);

  function updateCard(id, spent, budget, fillId, leftId, leftClass){
    var left = budget - spent;
    var pct = Math.min(100, spent/budget*100);
    document.getElementById(id+'Spent').textContent = fmt(spent);
    var leftEl = document.getElementById(id+'Left');
    leftEl.textContent = left>=0 ? fmt(left)+' left' : fmt(Math.abs(left))+' over';
    leftEl.className = 'budget-card-left '+(left<0?'over':left<budget*.2?'warn':'ok');
    var fill = document.getElementById(id+'Fill');
    fill.style.width = pct+'%';
    fill.style.background = pct>=100?'rgba(240,140,120,.9)':pct>=80?'rgba(240,200,100,.8)':
      id==='gas'?'rgba(120,170,220,.8)':'rgba(220,180,100,.8)';
  }
  updateCard('gas', gasSpent, GAS_WEEKLY);
  updateCard('misc', miscSpent, MISC_WEEKLY);

  // List this week's expenses grouped by day
  var byDay = {};
  wExps.forEach(e => {
    if(!byDay[e.date]) byDay[e.date] = [];
    byDay[e.date].push(e);
  });
  var dates = Object.keys(byDay).sort().reverse();
  var lbl = document.getElementById('logLbl');
  if(!dates.length){
    lbl.style.display = 'none';
    document.getElementById('todayList').innerHTML = '<div class="empty-today">Nothing logged this week yet.<br>Add your first expense above 👆</div>';
    return;
  }
  lbl.style.display = 'block';
  var today = new Date().getFullYear()+'-'+pad(new Date().getMonth()+1)+'-'+pad(new Date().getDate());
  var D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var html = '';
  dates.forEach((date, gi) => {
    var exps = byDay[date].slice().reverse();
    var d = new Date(date+'T12:00:00');
    var lbl2 = date===today?'Today':D[d.getDay()]+', '+M[d.getMonth()]+' '+d.getDate();
    var dayGas = exps.filter(e=>e.type==='gas').reduce((s,e)=>s+e.amount,0);
    var dayMisc = exps.filter(e=>e.type==='misc').reduce((s,e)=>s+e.amount,0);
    html += '<div style="margin-bottom:12px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding:0 2px"><div style="font-size:11px;font-weight:600;color:var(--txt2)">'+ lbl2 +'</div><div style="display:flex;gap:5px">';
    if(dayGas>0) html += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;background:var(--gas-soft);color:var(--gas)">⛽ '+fmt(dayGas)+'</span>';
    if(dayMisc>0) html += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;background:var(--gold-soft);color:var(--gold)">🛍 '+fmt(dayMisc)+'</span>';
    html += '</div></div>';
    exps.forEach(e => { html += expHTML(e, true); });
    html += '</div>';
  });
  document.getElementById('todayList').innerHTML = html;
}

function expHTML(e, showDel){
  var ico = e.type==='gas'?'⛽':'🛍';
  var col = e.type==='gas'?'var(--gas)':'var(--gold)';
  var t = new Date(e.ts), time = t.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
  return '<div class="exp-item">'+
    '<div class="exp-ico">'+ico+'</div>'+
    '<div class="exp-body">'+
    '<div class="exp-note">'+(e.note||(e.type==='gas'?'Gas':'Misc'))+'</div>'+
    '<div class="exp-meta">'+(e.type==='gas'?'Gas':'Misc')+' · '+time+'</div>'+
    '</div>'+
    '<div class="exp-amount" style="color:'+col+'">'+fmt(e.amount)+'</div>'+
    (showDel?'<button class="del-btn" onclick="delExp(\''+ e.id +'\')")>×</button>':'')+
    '</div>';
}

function logExpense(){
  var amt = parseFloat(document.getElementById('amtIn').value);
  if(!amt || amt<=0){document.getElementById('amtIn').focus();return;}
  var note = document.getElementById('noteIn').value.trim();
  var now = new Date();
  var date = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  expenses.push({
    id: Date.now()+'', ts: Date.now(), date,
    weekKey: currentWeekKey(),
    type: selType, amount: amt, note: note||null
  });
  save();
  document.getElementById('amtIn').value = '';
  document.getElementById('noteIn').value = '';
  renderToday();
  var btn = document.getElementById('submitBtn');
  btn.textContent = 'Logged ✓'; btn.style.background = 'var(--green)';
  setTimeout(()=>{btn.textContent='Log it →';btn.style.background='';}, 1400);
}

function delExp(id){
  expenses = expenses.filter(e=>e.id!==id);
  save(); renderToday();
}

function resetWeek(){
  weekStart = getWeekStart();
  save(); renderToday();
}

// HISTORY
function renderHistory(){
  // Group all expenses by weekKey
  var weeks = {};
  expenses.forEach(e=>{
    if(!weeks[e.weekKey]) weeks[e.weekKey] = [];
    weeks[e.weekKey].push(e);
  });
  var wkeys = Object.keys(weeks).sort().reverse();
  if(!wkeys.length){
    document.getElementById('historyBody').innerHTML = '<div class="no-data">No history yet.<br>Start logging this week!</div>';
    return;
  }
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('historyBody').innerHTML = wkeys.map((wk,wi)=>{
    var exps = weeks[wk];
    var gasT = exps.filter(e=>e.type==='gas').reduce((s,e)=>s+e.amount,0);
    var miscT = exps.filter(e=>e.type==='misc').reduce((s,e)=>s+e.amount,0);
    var isCurrentWeek = wk === currentWeekKey();
    var label = isCurrentWeek ? 'This week' : weekRangeLabel(wk);
    // Group by day within week
    var byDay = {};
    exps.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
    var dates = Object.keys(byDay).sort().reverse();
    var D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return '<div class="day-group" style="animation-delay:'+(wi*.05)+'s">'+
      '<div class="day-group-hdr">'+
      '<div class="day-group-date">'+label+'</div>'+
      '<div class="day-totals">'+
      (gasT>0?'<span class="day-total-pill gas '+(gasT>GAS_WEEKLY?'over':'')+'">'+fmt(gasT)+'</span>':'')+
      (miscT>0?'<span class="day-total-pill misc '+(miscT>MISC_WEEKLY?'over':'')+'">'+fmt(miscT)+'</span>':'')+
      '</div></div>'+
      dates.map(date=>{
        var d = new Date(date+'T12:00:00');
        var dlbl = D[d.getDay()]+', '+M[d.getMonth()]+' '+d.getDate();
        return '<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:var(--txt3);margin:8px 2px 4px;letter-spacing:.06em;text-transform:uppercase">'+dlbl+'</div>'+
          byDay[date].slice().reverse().map(e=>expHTML(e,false)).join('')+'</div>';
      }).join('')+
      '</div>';
  }).join('');
}

// STATS
function renderStats(){
  var gasAll=expenses.filter(e=>e.type==='gas').reduce((s,e)=>s+e.amount,0);
  var miscAll=expenses.filter(e=>e.type==='misc').reduce((s,e)=>s+e.amount,0);
  var weeks=[...new Set(expenses.map(e=>e.weekKey))];
  var avgGas=weeks.length?gasAll/weeks.length:0;
  var avgMisc=weeks.length?miscAll/weeks.length:0;
  var wExps=thisWeekExps();
  var wGas=wExps.filter(e=>e.type==='gas').reduce((s,e)=>s+e.amount,0);
  var wMisc=wExps.filter(e=>e.type==='misc').reduce((s,e)=>s+e.amount,0);
  var weekMap={};
  expenses.forEach(e=>{
    if(!weekMap[e.weekKey])weekMap[e.weekKey]={gas:0,misc:0};
    weekMap[e.weekKey][e.type]+=e.amount;
  });
  var gasOver=Object.values(weekMap).filter(w=>w.gas>GAS_WEEKLY).length;
  var miscOver=Object.values(weekMap).filter(w=>w.misc>MISC_WEEKLY).length;
  var wkeys=Object.keys(weekMap).sort().slice(-5);
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var html='';

  // This week
  var gLeft=GAS_WEEKLY-wGas, mLeft=MISC_WEEKLY-wMisc;
  html+='<div class="stat-card"><div class="stat-card-title">This Week</div><div class="stat-grid">'
    +'<div class="stat-cell"><div class="stat-cell-lbl">⛽ Gas spent</div><div class="stat-cell-val '+(wGas>GAS_WEEKLY?'red':'')+'">'+fmt(wGas)+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">⛽ Gas left</div><div class="stat-cell-val '+(gLeft<0?'red':'green')+'">'+(gLeft>=0?fmt(gLeft):'-'+fmt(Math.abs(gLeft)))+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">🛍 Misc spent</div><div class="stat-cell-val '+(wMisc>MISC_WEEKLY?'red':'')+'">'+fmt(wMisc)+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">🛍 Misc left</div><div class="stat-cell-val '+(mLeft<0?'red':'green')+'">'+(mLeft>=0?fmt(mLeft):'-'+fmt(Math.abs(mLeft)))+'</div></div>'
    +'</div></div>';

  // All time
  html+='<div class="stat-card"><div class="stat-card-title">All Time Averages (per week)</div><div class="stat-grid">'
    +'<div class="stat-cell"><div class="stat-cell-lbl">Avg gas/week</div><div class="stat-cell-val '+(avgGas>GAS_WEEKLY?'red':avgGas>GAS_WEEKLY*.8?'gold':'green')+'">$'+avgGas.toFixed(0)+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">Avg misc/week</div><div class="stat-cell-val '+(avgMisc>MISC_WEEKLY?'red':avgMisc>MISC_WEEKLY*.8?'gold':'green')+'">$'+avgMisc.toFixed(0)+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">Gas over budget</div><div class="stat-cell-val '+(gasOver>0?'red':'green')+'">'+gasOver+' wk'+(gasOver===1?'':'s')+'</div></div>'
    +'<div class="stat-cell"><div class="stat-cell-lbl">Misc over budget</div><div class="stat-cell-val '+(miscOver>0?'red':'green')+'">'+miscOver+' wk'+(miscOver===1?'':'s')+'</div></div>'
    +'</div></div>';

  // Weekly chart
  if(wkeys.length){
    html+='<div class="stat-card"><div class="stat-card-title">Weekly Spending (last 5 weeks)</div>';
    wkeys.forEach(wk=>{
      var g=weekMap[wk].gas||0, m=weekMap[wk].misc||0;
      var d=new Date(wk+'T12:00:00');
      var lbl=wk===currentWeekKey()?'This wk':M[d.getMonth()]+' '+d.getDate();
      var gpct=Math.min(100,g/GAS_WEEKLY*100), mpct=Math.min(100,m/MISC_WEEKLY*100);
      html+='<div style="margin-bottom:10px">'
        +'<div style="font-size:10px;font-weight:600;color:var(--txt3);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase">'+lbl+'</div>'
        +'<div class="two-bar-row"><div class="two-bar-lbl">⛽ Gas</div>'
        +'<div class="two-bar-track"><div class="two-bar-fill" style="width:'+gpct+'%;background:'+(g>GAS_WEEKLY?'var(--red)':'var(--gas)')+'"></div></div>'
        +'<div class="two-bar-val" style="color:'+(g>GAS_WEEKLY?'var(--red)':'var(--txt)')+'">'+fmtShort(g)+'</div></div>'
        +'<div class="two-bar-row"><div class="two-bar-lbl">🛍 Misc</div>'
        +'<div class="two-bar-track"><div class="two-bar-fill" style="width:'+mpct+'%;background:'+(m>MISC_WEEKLY?'var(--red)':'var(--gold)')+'"></div></div>'
        +'<div class="two-bar-val" style="color:'+(m>MISC_WEEKLY?'var(--red)':'var(--txt)')+'">'+fmtShort(m)+'</div></div>'
        +'</div>';
    });
    html+='</div>';
  }
  document.getElementById('statsBody').innerHTML=html;
}

function goTo(name){
  ['Today','History','Stats'].forEach(s=>{
    document.getElementById('screen'+s).classList.toggle('active',s===name);
    document.getElementById('nav'+s).classList.toggle('active',s===name);
  });
  if(name==='Today') renderToday();
  if(name==='History') renderHistory();
  if(name==='Stats') renderStats();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement.id!=='noteIn') logExpense();
});

load(); renderToday();
</script>
</body>
</html>
